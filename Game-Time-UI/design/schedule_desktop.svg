<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <style>
    .bg{fill:#fafafa}
    .header{font:600 20px/1.2 Arial; fill:#222}
    .muted{font:16px Arial; fill:#666}
    .cell{fill:#fff; stroke:#e6e6e6}
    .times{font:14px Arial; fill:#333}
    .chip{rx:6; ry:6}
    .chip-text{font:13px Arial; fill:#fff}
  </style>
  <rect class="bg" x="0" y="0" width="1200" height="800"/>
  <!-- Header -->
  <g transform="translate(20,20)">
    <text class="header">周视图课表</text>
    <g transform="translate(880,0)">
      <rect x="0" y="-8" width="80" height="32" rx="6" fill="#f0f0f0" stroke="#ddd"/>
      <text x="14" y="16" class="muted">上一周</text>
    </g>
    <g transform="translate(980,0)">
      <rect x="0" y="-8" width="80" height="32" rx="6" fill="#007aff"/>
      <text x="22" y="16" style="font:600 14px Arial; fill:#fff">下一周</text>
    </g>
  </g>

  <!-- Grid start -->
  <g transform="translate(20,70)">
    <!-- time column width -->
    <g>
      <!-- Column headers -->
      <rect x="80" y="0" width="980" height="40" fill="#fff" stroke="#eaeaea"/>
      <!-- 7 day headers -->
      <!-- each day width = 980/7 = 140 -->
      <g font-family="Arial" font-size="14" fill="#333">
        <text x="95" y="26">周一</text>
        <text x="235" y="26">周二</text>
        <text x="375" y="26">周三</text>
        <text x="515" y="26">周四</text>
        <text x="655" y="26">周五</text>
        <text x="795" y="26">周六</text>
        <text x="935" y="26">周日</text>
      </g>
    </g>

    <!-- Rows: 14 timeslots -->
    <!-- rowHeight -->
    <g>
      <!-- times column -->
      <g>
        <!-- generate 14 rows -->
        <!-- times listing left column width 80 -->
        <!-- draw grid cells -->
      </g>
      <!-- draw rows and cells -->
      <g>
        <!-- background for grid -->
        <rect x="0" y="40" width="1060" height="560" fill="#fff" stroke="#e6e6e6"/>
        <!-- rows lines -->
        <!-- compute rowHeight = 560/14 = 40 -->
        <!-- draw time labels + cells -->
        <!-- Time labels -->
        <g fill="#333" font-family="Arial" font-size="12">
          <!-- times loop -->
          <text x="10" y="66">08-09</text>
          <text x="10" y="106">09-10</text>
          <text x="10" y="146">10-11</text>
          <text x="10" y="186">11-12</text>
          <text x="10" y="226">12-13</text>
          <text x="10" y="266">13-14</text>
          <text x="10" y="306">14-15</text>
          <text x="10" y="346">15-16</text>
          <text x="10" y="386">16-17</text>
          <text x="10" y="426">17-18</text>
          <text x="10" y="466">18-19</text>
          <text x="10" y="506">19-20</text>
          <text x="10" y="546">20-21</text>
          <text x="10" y="586">21-22</text>
        </g>

        <!-- draw vertical column separators and cell backgrounds -->
        <!-- for each col (7) draw rects -->
        <!-- x start for day columns = 80 -->
        <!-- cell width 140, rowHeight 40 -->
        <!-- draw sample chips in one cell -->
        <!-- draw cells rectangles -->
        <!-- loop rows and cols manually simplified -->
        <!-- sample: row 2 (index 2 -> 10-11) col 0 (周一) has two chips -->
        <!-- draw chip 1 -->
        <g>
          <!-- chip background 1 -->
          <rect x="90" y="128" width="100" height="24" rx="6" fill="#FF7A7A"/>
          <text x="100" y="146" class="chip-text">游戏A（alice）</text>
          <!-- chip background 2 -->
          <rect x="90" y="154" width="80" height="24" rx="6" fill="#6C9EFF"/>
          <text x="100" y="172" class="chip-text">游戏B（bob）</text>
          <!-- +N indicator if more -->
          <rect x="190" y="154" width="36" height="24" rx="6" fill="#e0e0e0"/>
          <text x="198" y="172" fill="#333" font-family="Arial" font-size="12">+3</text>
        </g>

        <!-- draw light grid lines -->
        <g stroke="#f3f3f3">
          <!-- vertical lines -->
          <line x1="80" y1="40" x2="80" y2="600" />
          <line x1="220" y1="40" x2="220" y2="600" />
          <line x1="360" y1="40" x2="360" y2="600" />
          <line x1="500" y1="40" x2="500" y2="600" />
          <line x1="640" y1="40" x2="640" y2="600" />
          <line x1="780" y1="40" x2="780" y2="600" />
          <line x1="920" y1="40" x2="920" y2="600" />
          <line x1="1060" y1="40" x2="1060" y2="600" />
          <!-- horizontal lines -->
          <!-- 14 rows -->
          <g stroke="#f3f3f3">
            <line x1="0" y1="80" x2="1060" y2="80" />
            <line x1="0" y1="120" x2="1060" y2="120" />
            <line x1="0" y1="160" x2="1060" y2="160" />
            <line x1="0" y1="200" x2="1060" y2="200" />
            <line x1="0" y1="240" x2="1060" y2="240" />
            <line x1="0" y1="280" x2="1060" y2="280" />
            <line x1="0" y1="320" x2="1060" y2="320" />
            <line x1="0" y1="360" x2="1060" y2="360" />
            <line x1="0" y1="400" x2="1060" y2="400" />
            <line x1="0" y1="440" x2="1060" y2="440" />
            <line x1="0" y1="480" x2="1060" y2="480" />
            <line x1="0" y1="520" x2="1060" y2="520" />
            <line x1="0" y1="560" x2="1060" y2="560" />
            <line x1="0" y1="600" x2="1060" y2="600" />
          </g>
        </g>
      </g>
    </g>
  </g>

  <!-- notes -->
  <g transform="translate(20,650)">
    <text class="muted">说明：每个单元格可堆叠多条预约，显示前两条并展示 "+N" 指示。</text>
  </g>
</svg>
