<svg xmlns="http://www.w3.org/2000/svg" width="420" height="980" viewBox="0 0 420 980">
  <style>
    .bg{fill:#fff}
    .header{font:600 18px Arial; fill:#222}
    .muted{font:14px Arial; fill:#666}
    .cell{fill:#fff; stroke:#eee}
    .chip-text{font:12px Arial; fill:#fff}
  </style>
  <rect class="bg" x="0" y="0" width="420" height="980"/>
  <!-- Header -->
  <g transform="translate(12,14)">
    <text class="header">周视图课表（移动）</text>
    <g transform="translate(260,0)">
      <rect x="0" y="-6" width="56" height="28" rx="6" fill="#f0f0f0" stroke="#ddd"/>
      <text x="8" y="16" class="muted">上一周</text>
    </g>
    <g transform="translate(320,0)">
      <rect x="0" y="-6" width="56" height="28" rx="6" fill="#007aff"/>
      <text x="12" y="16" style="font:600 12px Arial; fill:#fff">下一周</text>
    </g>
  </g>

  <!-- week days horizontally scrollable mock -->
  <g transform="translate(12,60)">
    <!-- day header strip -->
    <rect x="0" y="0" width="396" height="40" fill="#f8f8f8" rx="6"/>
    <text x="12" y="26" font-family="Arial" font-size="14" fill="#333">周一</text>
    <text x="72" y="26" font-family="Arial" font-size="14" fill="#333">周二</text>
    <text x="132" y="26" font-family="Arial" font-size="14" fill="#333">周三</text>
    <text x="192" y="26" font-family="Arial" font-size="14" fill="#333">周四</text>
    <text x="252" y="26" font-family="Arial" font-size="14" fill="#333">周五</text>
    <text x="312" y="26" font-family="Arial" font-size="14" fill="#333">周六</text>
    <text x="372" y="26" font-family="Arial" font-size="14" fill="#333">周日</text>
  </g>

  <!-- grid: show 7 columns as horizontal pages; here show single day column tall with 14 rows -->
  <g transform="translate(12,120)">
    <rect x="0" y="0" width="396" height="700" fill="#fff" stroke="#eee" rx="6"/>
    <!-- time labels left small -->
    <g fill="#333" font-family="Arial" font-size="12">
      <text x="8" y="36">08-09</text>
      <text x="8" y="86">09-10</text>
      <text x="8" y="136">10-11</text>
      <text x="8" y="186">11-12</text>
      <text x="8" y="236">12-13</text>
      <text x="8" y="286">13-14</text>
      <text x="8" y="336">14-15</text>
      <text x="8" y="386">15-16</text>
      <text x="8" y="436">16-17</text>
      <text x="8" y="486">17-18</text>
      <text x="8" y="536">18-19</text>
      <text x="8" y="586">19-20</text>
      <text x="8" y="636">20-21</text>
      <text x="8" y="686">21-22</text>
    </g>

    <!-- sample chips for mobile stacked in a single day column -->
    <rect x="80" y="120" width="200" height="26" rx="6" fill="#FF7A7A"/>
    <text x="88" y="138" class="chip-text">游戏A（alice）</text>
    <rect x="80" y="156" width="160" height="26" rx="6" fill="#6C9EFF"/>
    <text x="88" y="174" class="chip-text">游戏B（bob）</text>
    <rect x="80" y="192" width="80" height="26" rx="6" fill="#e0e0e0"/>
    <text x="88" y="210" fill="#333" font-family="Arial" font-size="12">+3</text>

  </g>

  <g transform="translate(12,840)">
    <text class="muted">移动端：以单日列为滚动内容，可横向滑动查看其他日期。</text>
  </g>
</svg>
